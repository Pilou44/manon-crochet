<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Manon Crochet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
    <div class="card shadow p-4" style="width:100%; max-width:400px">
      <h4 class="mb-4 text-center">Administration</h4>

      <div id="erreur" class="alert alert-danger d-none"></div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" id="motdepasse" class="form-control">
      </div>
      <button id="btnLogin" class="btn btn-dark w-100">Se connecter</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
